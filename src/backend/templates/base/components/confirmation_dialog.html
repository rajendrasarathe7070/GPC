<div id="confirmation-dialog" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-hidden="true" tabindex="-1">
    <div class="modal-overlay" data-close-modal></div>
    <div class="modal-content">
        <h3 id="confirm-title" class="modal-title">Confirm Action</h3>
        <p id="confirm-message" class="modal-message">Are you sure you want to proceed?</p>
        <div class="modal-actions">
            <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
            <button type="button" class="btn btn-danger" id="confirm-action-btn">Confirm</button>
        </div>
    </div>
</div>
