<nav aria-label="Breadcrumb" class="breadcrumb-nav">
    <div class="container">
        <ol class="breadcrumb" itemscope itemtype="https://schema.org/BreadcrumbList">
            {% for item in breadcrumb %}
            <li class="breadcrumb-item{% if not item.url %} active{% endif %}" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                {% if item.url %}
                <a href="{{ item.url }}" itemprop="item"><span itemprop="name">{{ item.label }}</span></a>
                {% else %}
                <span itemprop="name">{{ item.label }}</span>
                {% endif %}
                <meta itemprop="position" content="{{ forloop.counter }}">
            </li>
            {% endfor %}
        </ol>
    </div>
</nav>
